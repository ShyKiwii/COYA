<!DOCTYPE html>
<html lang="en">
    <head>
        <title>My Adventure Game</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <!-- Story display -->
        <div id="story" class="story-text">
            Loading...
        </div>
        <button id="skipBtn" class="skip-button" hidden>Skip</button>

        <div id="nameSection" hidden>
            <input type="text" id="userInput" placeholder="Enter your name">
            <button id="submitBtn">Submit</button>
        </div>

        <!-- Choices display  -->
        <div id="choices"></div>

        <script src="script.js"></script>
    </body>
</html>
